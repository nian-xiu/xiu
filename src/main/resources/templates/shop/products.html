<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部商品 - 心怡商城</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260625a')}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <header class="catalog-hero">
        <div>
            <span class="eyebrow">商品广场</span>
            <h1>全部商品</h1>
            <p class="muted">按类目、价格、销量和评分快速筛选，只展示当前在售商品。</p>
        </div>
        <strong th:text="'共 ' + ${#lists.size(products)} + ' 件'">共 0 件</strong>
    </header>
    <form class="filter-bar" th:action="@{/products}" method="get">
        <div class="field"><label>关键词</label><input name="keyword" th:value="${filter.keyword}" placeholder="手机、咖啡、跑鞋"></div>
        <div class="field">
            <label>分类</label>
            <select name="categoryId">
                <option value="">全部分类</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${filter.categoryId == category.id}" th:text="${category.name}">分类</option>
            </select>
        </div>
        <div class="field">
            <label>排序</label>
            <select name="sort">
                <option value="">综合推荐</option>
                <option value="sales" th:selected="${filter.sort == 'sales'}">销量优先</option>
                <option value="rating" th:selected="${filter.sort == 'rating'}">评分优先</option>
                <option value="newest" th:selected="${filter.sort == 'newest'}">新近上架</option>
                <option value="priceAsc" th:selected="${filter.sort == 'priceAsc'}">价格从低到高</option>
                <option value="priceDesc" th:selected="${filter.sort == 'priceDesc'}">价格从高到低</option>
            </select>
        </div>
        <div class="field"><label>最低价</label><input type="number" name="minPrice" th:value="${filter.minPrice}"></div>
        <div class="field"><label>最高价</label><input type="number" name="maxPrice" th:value="${filter.maxPrice}"></div>
        <button type="submit">筛选</button>
    </form>

    <div class="product-grid">
        <article class="product-card" th:each="product : ${products}">
            <a th:href="@{/products/{id}(id=${product.id})}">
                <img th:src="${product.coverUrl}" th:alt="${product.name}">
                <div class="product-info">
                    <div class="product-card-top">
                        <span class="badge" th:text="${product.categoryName}">分类</span>
                        <span class="stock-pill" th:text="${product.stock > 30 ? '现货' : '库存紧张'}">现货</span>
                    </div>
                    <div class="chip-row">
                        <span class="chip" th:text="'销量 ' + ${product.sales}">销量 0</span>
                        <span class="chip" th:text="'评分 ' + ${product.rating}">评分 5.0</span>
                        <span class="chip" th:if="${product.originalPrice != null}" th:text="'省 ¥' + ${product.originalPrice.subtract(product.price)}">省 ¥0</span>
                    </div>
                    <h3 th:text="${product.name}">商品</h3>
                    <p class="muted" th:text="${product.subtitle}">副标题</p>
                    <p class="muted"><span th:text="${product.categoryName}">分类</span> · <span th:text="'销量 ' + ${product.sales}">销量</span></p>
                    <div>
                        <span class="price" th:text="'¥' + ${product.price}">¥0</span>
                        <span class="badge" th:text="${product.status == 'ON_SALE' ? '在售' : '下架'}">状态</span>
                    </div>
                </div>
            </a>
            <form class="quick-cart" th:action="@{/cart/add}" method="post" th:if="${currentUser != null and product.status == 'ON_SALE' and product.stock > 0}">
                <input type="hidden" name="productId" th:value="${product.id}">
                <input type="hidden" name="quantity" value="1">
                <button type="submit" aria-label="加入购物车">+</button>
            </form>
            <div class="card-menu" th:if="${currentUser != null}">
                <form th:action="@{/favorites/toggle}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit">收藏商品</button>
                </form>
                <form th:action="@{/blacklist/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" name="redirect" th:value="@{/products}">
                    <button type="submit">黑名单商品</button>
                </form>
            </div>
        </article>
    </div>
    <div class="panel" th:if="${#lists.isEmpty(products)}">没有找到匹配的商品，可以换个关键词试试。</div>
</main>
<script th:src="@{/js/app.js(v='20260607a')}"></script>
</body>
</html>
