<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人设置 - 心怡商城</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260629c')}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: flash}"></div>
<main class="container settings-layout">
    <section class="panel profile-card">
        <span class="avatar avatar-large" th:text="${#strings.substring(currentUser.nickname, 0, 1)}">用</span>
        <div>
            <h1 th:text="${currentUser.nickname}">用户昵称</h1>
            <p class="muted" th:text="${currentUser.username}">username</p>
        </div>
    </section>

    <section class="panel">
        <h2>个人信息</h2>
        <form th:action="@{/settings/profile}" th:object="${profileForm}" method="post" class="form-grid">
            <div class="field"><label>用户名</label><input th:field="*{username}"><span class="error-text" th:errors="*{username}"></span></div>
            <div class="field"><label>昵称</label><input th:field="*{nickname}"><span class="error-text" th:errors="*{nickname}"></span></div>
            <div class="field"><label>手机</label><input th:field="*{phone}"></div>
            <div class="field"><label>邮箱</label><input th:field="*{email}"><span class="error-text" th:errors="*{email}"></span></div>
            <div class="field full"><label>当前密码（仅修改用户名时需要）</label><input type="password" th:field="*{currentPassword}"></div>
            <div class="error-text full" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <div class="actions"><button type="submit">保存资料</button></div>
        </form>
    </section>

    <section class="panel">
        <h2>登录密码</h2>
        <form th:action="@{/settings/password}" th:object="${passwordForm}" method="post" class="form-grid">
            <div class="field"><label>当前密码</label><input type="password" th:field="*{currentPassword}"><span class="error-text" th:errors="*{currentPassword}"></span></div>
            <div class="field"><label>新密码</label><input type="password" th:field="*{newPassword}"><span class="error-text" th:errors="*{newPassword}"></span></div>
            <div class="field"><label>确认新密码</label><input type="password" th:field="*{confirmPassword}"><span class="error-text" th:errors="*{confirmPassword}"></span></div>
            <div class="error-text full" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <div class="actions"><button type="submit">更新密码</button></div>
        </form>
    </section>

    <section class="panel">
        <div class="section-title compact">
            <h2>收货地址</h2>
            <a class="button" th:href="@{/addresses/new}">新增地址</a>
        </div>
        <div class="address-list" th:if="${!#lists.isEmpty(addresses)}">
            <article th:each="address : ${addresses}">
                <strong th:text="${address.receiver + ' · ' + address.phone}">收货人</strong>
                <p th:text="${address.province + address.city + address.district + address.detail}">地址</p>
                <div class="actions">
                    <span class="badge" th:if="${address.defaultAddress}">默认</span>
                    <a class="button ghost" th:href="@{/addresses/{id}/edit(id=${address.id})}">编辑</a>
                </div>
            </article>
        </div>
        <p class="muted" th:if="${#lists.isEmpty(addresses)}">还没有收货地址。</p>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/app.js(v='20260629c')}"></script>
</body>
</html>
