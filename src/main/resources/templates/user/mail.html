<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮件 - 心怡商城</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260625a')}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<div th:replace="~{fragments/layout :: flash}"></div>
<main class="container reward-dashboard">
    <header class="page-hero gradient-blue">
        <div>
            <span class="eyebrow">奖励邮件</span>
            <h1>站内信 · 一键领奖</h1>
            <p class="muted">这部分是管理员发给你的金币或优惠券，点击进入即标记为已读，可批量领取所有奖励。</p>
        </div>
        <div class="hero-stats">
            <div class="hero-stat"><span>当前金币</span><strong th:text="${profile.coins}">0</strong></div>
            <div class="hero-stat"><span>邮件数量</span><strong th:text="${#lists.size(mails)}">0</strong></div>
            <div class="hero-stat"><span>未读</span><strong th:text="${mailUnreadLocalCount}">0</strong></div>
            <div class="hero-stat"><span>可领取</span><strong th:text="${claimableMailCount}">0</strong></div>
        </div>
    </header>

    <section class="panel toolbar" th:if="${claimableMailCount > 0}">
        <div>
            <h2>批量奖励</h2>
            <p class="muted">点击右侧按钮一键领取所有未领取的邮件奖励，金币与优惠券会自动入账。</p>
        </div>
        <form th:action="@{/mail/claim-all}" method="post">
            <input th:replace="~{fragments/layout :: csrf}">
            <button type="submit" class="primary">一键全部领取（<span th:text="${claimableMailCount}">0</span>）</button>
        </form>
    </section>

    <section class="mail-grid">
        <article class="mail-card"
                 th:each="mail : ${mails}"
                 th:classappend="${mail.unread} ? 'is-unread' : ''">
            <div class="mail-head">
                <div class="mail-meta">
                    <div class="reward-chip-row">
                        <span class="badge" th:text="${mail.statusLabel}">状态</span>
                        <span class="badge" th:text="${mail.rewardLabel}">奖励</span>
                    </div>
                    <h3 th:text="${mail.title}">邮件标题</h3>
                    <p class="muted" th:text="${mail.senderName != null ? '发件人：' + mail.senderName : '发件人：管理员'}">发件人</p>
                </div>
                <span class="badge" th:text="${#temporals.format(mail.createdAt, 'yyyy-MM-dd HH:mm')}">时间</span>
            </div>
            <div class="reward-divider"></div>
            <p th:text="${mail.message}">内容</p>
            <p class="muted" th:if="${mail.expiresAt != null}" th:text="${'到期：' + #temporals.format(mail.expiresAt, 'yyyy-MM-dd HH:mm')}">到期</p>
            <div class="mail-actions">
                <form th:if="${mail.claimable}" th:action="@{/mail/{id}/claim(id=${mail.id})}" method="post">
                    <input th:replace="~{fragments/layout :: csrf}">
                    <button type="submit" class="primary">领取奖励</button>
                </form>
                <button class="ghost" type="button" th:disabled="${!mail.claimable}">查看邮件</button>
            </div>
        </article>
    </section>
</main>
<script th:src="@{/js/app.js(v='20260607a')}"></script>
</body>
</html>
