<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑地址 - 心怡商城</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260607a')}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <section class="panel">
        <h1>收货地址</h1>
        <form th:action="${action}" th:object="${addressForm}" method="post" class="form-grid">
            <div class="field"><label>收货人</label><input th:field="*{receiver}"><span class="error-text" th:errors="*{receiver}"></span></div>
            <div class="field"><label>手机号</label><input th:field="*{phone}"><span class="error-text" th:errors="*{phone}"></span></div>
            <div class="field"><label>省份</label><input th:field="*{province}"><span class="error-text" th:errors="*{province}"></span></div>
            <div class="field"><label>城市</label><input th:field="*{city}"><span class="error-text" th:errors="*{city}"></span></div>
            <div class="field"><label>区县</label><input th:field="*{district}"><span class="error-text" th:errors="*{district}"></span></div>
            <div class="field"><label>详细地址</label><input th:field="*{detail}"><span class="error-text" th:errors="*{detail}"></span></div>
            <label class="field full"><span>设为默认地址</span><input type="checkbox" th:field="*{defaultAddress}" style="width: auto;"></label>
            <div class="actions">
                <button type="submit">保存地址</button>
                <a class="button ghost" th:href="@{/addresses}">返回</a>
            </div>
        </form>
    </section>
</main>
<script th:src="@{/js/app.js(v='20260607a')}"></script>
</body>
</html>
