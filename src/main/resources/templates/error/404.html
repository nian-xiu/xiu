<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面不存在 - 心怡商城</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260625a')}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <section class="panel error-page">
        <span class="badge">404</span>
        <h1>页面不存在</h1>
        <p class="muted">你访问的内容可能已经下架、删除，或地址输入有误。</p>
        <div class="actions">
            <a class="button" th:href="@{/}">返回首页</a>
            <a class="button ghost" th:href="@{/products}">继续逛商品</a>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js(v='20260607a')}"></script>
</body>
</html>
