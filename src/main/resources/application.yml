server:
  port: 8080
  servlet:
    session:
      timeout: 2h
      tracking-modes: cookie
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  undertow:
    threads:
      io: 4
      worker: 16
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml

spring:
  application:
    name: ssm-shop
  main:
    banner-mode: off
  jmx:
    enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ssm_shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: SsmShopHikariPool
  sql:
    init:
      mode: never
  thymeleaf:
    cache: true
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

logging:
  level:
    root: WARN
    com.example.ssmshop: INFO
    org.springframework.web: WARN
    org.mybatis: WARN

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.ssmshop.domain
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true

app:
  upload:
    product-image-dir: uploads/products
  security:
    password-salt: ${APP_PASSWORD_SALT:ssm-shop-demo-salt}
